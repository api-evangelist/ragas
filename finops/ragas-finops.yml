specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ragas
providerId: ragas
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI Evaluation
- LLM
- RAG
- Open Source
- Python
- Metrics
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Ragas. The library itself is free. Real cost is the LLM/embedding
  spend incurred during evaluation runs (judge model calls, embedding calls). Optimize by selecting
  cheaper judge models (e.g. GPT-4o-mini), batching test sets, caching, and limiting eval set size.
notes: Cost is upstream LLM spend; Ragas is free.
sources:
- https://docs.ragas.io/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Exploding Gradients (Ragas)
serviceCategory: AI Evaluation
billingModel:
  pricingCategory: Free / Open Source
  billingFrequency: N/A
  billingCurrency: N/A
  chargeCategories:
  - Usage
focusColumns:
  ServiceName: Ragas
  ServiceCategory: AI Evaluation
  ProviderName: Ragas (Exploding Gradients)
  PublisherName: Ragas
  InvoiceIssuerName: N/A
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: judge_model_tokens
  description: Tokens consumed against an upstream judge LLM during eval (cost is on the LLM provider invoice).
  unit: token
  aggregation: sum
  dimensions:
  - provider
  - model
- name: embedding_tokens
  description: Tokens consumed against an upstream embedding model.
  unit: token
  aggregation: sum
  dimensions:
  - provider
  - model
principles:
- name: Visibility
  description: Tag evaluation runs in the upstream LLM provider's usage dashboard.
- name: Allocation
  description: Allocate eval-run cost to the AI feature being measured.
- name: Optimization
  description: Choose cheaper judge models; cap eval-set size; cache eagerly.
- name: Accountability
  description: AI/ML team owns evaluation-run cost; track separately from production inference cost.
maintainers:
